俗諦者一切法性空而世間顛倒故生虛妄法於世間是實諸賢聖真知顛倒性故知一切法皆空無生於聖人是第一義諦名為實這二者是佛陀説法的根本方式只能從這個根本上進一步的去離妄入真體悟諸法的真相不能躐等的擬議圓融二説二諦教顯勝義空佛依緣起説二諦教目的在使吾人依世俗諦通達第一義諦因為若不依俗諦不得第一義所以要説世俗諦説二諦而重心在勝義空因為不得第一義則不得涅槃這個意義是非常重要的衆生在生死中一切都沒有辦法病根就在妄執真實的自性若是打破自性的妄執體達無自性空那一切就都獲得解決了緣起的空有無礙是諸法的真相但卻是聖者自覺的境界在我們只能作為崇高的理想作為前進的目標可以意解他卻不能因觀想圓融得解脫在自性見毫釐許未破的凡夫先應該側重透徹一切空打破這凡聖一關再説世俗諦是凡夫所認識的一切凡夫所認識的顛倒虛妄本不成其為諦因凡夫的心境上有這真實相現起執為實有所以隨順世間也就説為真實雖覺得這一切是真實的其實很不可靠所以佛陀給我們指出認識中的虛妄顯示聖者自覺的真實使凡夫發心進求諸法的真性這需要破除虛妄不實開顯一切法的無自性空一般人覺得是真實自性有的現在説不是真實的從觀察到悟解這不真實的自性無才能窺見一切法的真相這很重要離生死虛妄入解脫真實都從此下手什麼是自性自性就是自體我們見聞覺知到的總覺得他有這樣的實在自體從根本的自性見説我們不假思惟分別在任運直覺中有一真實自成的影像在心上浮現不是從推論中得來的實自性因直覺中有這根本錯誤的存在所以聯想推論思惟等等都含著錯誤學者們製造了種種錯誤的見解前者是俱生的後者是分別而生的直覺所覺的不由思惟分別得來的自性有使我們不能直覺現量一切法是因緣和合有的這不是衆緣和合的自性有必然直覺他是獨存的個體的像我們直覺到的人總是個體的不理解他是因緣和合的有四肢百骸的所以自性有的自成必然伴有獨存的感覺由獨存的一産生了敵對的二多覺得這個與那個是一個個的對立著獨立的一也好敵對的二也好都是同一的錯誤在哲學上一元論呀二元論呀多元論呀都是淵源於獨存的錯覺他們根本的要求是一發現了一的不通又去講二講多等到發現了二與種種有著不可離的關係再掉轉頭去講一任他怎樣的説一説多只要有自性見的根本錯誤在結果都是此路不通自成的獨存的自性有直覺上不能了解他是生滅變化的總覺得是常爾的像一個人從少到老在思惟分別中雖能覺得他長短肥瘦老少有著很大的變化在自性見的籠罩下就是思惟分別也常會覺得他的長短老少只是外面的變化內在還是那個從前看見的他思惟還不能徹底的見到變化何況是直覺事實上一切法無時不在變化的佛陀説諸行無常就是在一剎那最短的時間中也是生滅演變的因我們的直覺上不能發現諸法的變化性所以覺得他是常世間學者多喜歡談常病根就在此另一分學者在意識的聯想中感到無常但因常爾的自性見作怪不能理解無常的真義不是外動而內靜就前後失卻聯繫成為斷滅斷是常的另一姿態不是根本上有什麼不同如二與一一樣總上面所説的自性有三義一自有就是自體真實是這樣的這違反了因緣和合生的正見二獨一不見相互的依存性以為是個體的對立的三常住不見前後的演變以為是常的否則是斷的自性三義依本論觀有無品初二頌建立由有即一而三三而即一的根本錯誤使我們生起種種的執著世間的宗教哲學等理論不承認一切空終究是免不了自性見的錯誤佛説一切法是緣起的緣起是無自性的就是掃除這個根本錯誤的妙方便無自性的緣起如幻如化才能成立無常而非斷滅的無獨立自體的存在而不是機械式的種種對立的非有不生而能隨緣幻有幻生的本論開端説的不生亦不滅不常亦不斷不一亦不異就是發明此意所空的也就是空卻這個自性假使我們承認這自性見是正確的不特在理論上不能説明一切事理並且因這根本無明的執著成為流轉生死的根本不能解脫這自性見人類是具有的就是下等動物如豬馬牛羊牠們的直覺上也還是有這錯誤顛倒的不過不能用名相來表示罷了這自性見在一一法上轉就叫法我見在一一有情上轉就叫人我見破除這自性見就是法空與我空佛説二諦使我們通達勝義空這是佛陀説法的本懷緣起是佛法的特色照樣的空也是佛法的特色但因為學者認識的淺深就有三種不同一分破空天台家叫做析法空就是在事事物物的觀察上利用分析的方法理解他假合的無體空如一本書一張張的分析起來就顯出它的沒有真實自體這分破空能通達真相解脫生死嗎不能這不是龍樹學所要發揮的世間與小乘學者都會談到這樣的空這空是不徹底的觀察分析到不可再分割的質點他們就必然要執著為實有的以為一切是依這實有而合成的所以雖然説空結果還是不空這不空的實際上就是非緣起的像有部説一切法有色法是一微一微的心法是一剎那一剎那的這都是分析空所得到的結果二觀空這可以名為唯識空就是在感情的苦樂好惡上一切法常是隨觀念而轉的如果是修習瑜伽的像十一切處不淨觀等都能達到境隨心變的體驗火是紅的熱的在瑜伽行者可以不是紅的熱的境隨心轉所以境空小乘經部的境不成實大乘唯識的有心無境都是從這觀空的證驗而演化成的這雖比分破空深刻些但還是不徹底因為最後還是不空境隨心轉境