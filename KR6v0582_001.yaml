三手不同所以世俗諦中雖一切唯假名而假名的有無也還是有分別如外道的上帝自在天梵天等佛法中無分的極微色剎那心等都是妄執如以為有緣起假名必會弄成邪正不分善惡不分大略的説我們明淨六根所認識的一切在一般世間常識中科學的真實也屬於此確有此體質相用的須承認他的存在如果否認他這就與世間相違了這裡面自然也有錯誤而我們習見以為正確的或隱微而還沒有被我們發現的這需要世間智的推究發明菩薩如果證悟一切法空正見緣起的存在那更有許多不是一般常識所知的呢龍樹學的立破善巧歸納起來有兩點一世出世法在一個根本定義上建立就是世間的生死是性空緣起出世的生死解脫也是性空緣起所不同的在能不能理解性空能理解到的就是悟入出世法不能理解到的就是墮入世間法所以世間的一花一草出世間的菩薩行果都是性空緣起這就達到世出世法的一貫二聲聞法與菩薩法同在解脫生死的根本自性見上建立就是聲聞人在性空緣起上獲得解脫菩薩人同樣在性空緣起中得解脫所不同的菩薩的大悲願行勝過了聲聞這就達到了聲聞法與菩薩法的一貫龍樹深入佛法的緣起在立破上可説善巧到了頂點四中論在中國龍樹中觀學在佛教中無論是從印度西藏中國講都曾引起很大的影響現在單就中國來説中國自羅什三藏在長安逍遙園翻譯出來中國佛學者才真正的見到大乘佛法過去雖也有人談空但都不理解空的真義什公門下有幾個傑出人才僧肇法師是最有成就的羅什三藏曾稱讚他秦人解空第一他與什公的關係也比較密切在什公未入關以前他就到姑臧去親近什公又隨侍什公來長安親近了十有餘年他著有肇論維摩經注思想很切近龍樹學的正義有一部寶藏論也傳説是僧肇作的其實是唐代禪和子的胡謅託古其次曇影僧睿二法師思想也都相當正確所以什公説傳我業者寄在道融曇影僧睿乎那親近什公不久號稱什門四哲之一的生公説法頑石點頭的道生法師他是南京竺法汰的弟子非常聰明但他到長安不久就走了對什公的性空學沒有什麼深入也並不滿意他回到南京並未弘揚什公的大乘學卻融貫儒釋糅合真常他著名的七珍論像佛性論頓悟論與什公學都不吻合什公西逝兩三年關中大亂護持佛教的姚興也死了什公的龍樹學沒有得到健全的發揚特別是肇師青年早死素患勞疾是什公所傳大乘學的大損失把什公所譯的經論傳到南方來的像慧觀慧嚴他們積極從事經論的翻譯所弘的教法也傾向覺賢的華嚴曇無讖的涅槃真常的經論緊接著大量的譯出來如涅槃經金光明經菩薩善戒經楞伽經等經所以中國的性空學起初是沒有大發展的這主要的中國人的思想與印度有一重隔礙認為一切菩薩的論典一切大小的經典都是一貫的所以雖讚揚什公的譯典和性空但喜歡把各種思想融於一爐這樣性空大乘與真常大乘早就種下了合流的趨勢稍後什公門下的思想從北方傳來江南的有三大系第一系是成實大乘師他們以為三論中論百論十二門論偏空關於事相太缺乏了而什譯的成實論不特明人法二空與性空相同還大談事相他們把成實論看為三乘共同而且是與大乘空理平等的所以用成實論空有的見解去講法華經涅槃經等大乘經成為綜合的學派成論大乘當南朝齊梁時代成實大乘盛到了頂點這一系像彭城僧嵩壽春僧導們都是什公的及門弟子從長安東下到彭城今江蘇徐州壽春今安徽壽縣再向南到揚都現在的首都再沿長江上下第二系是三論大乘這與成實大乘師有相當的關係這一系的前驅者像宋北多寶寺的道亮廣州大亮他是從關河來的他弘揚二諦是教的思想是三論學初弘的要義之一他的弟子智林是高昌人他自己説年輕的時候曾在關中學過肇公假名空的思想師資二人在三論的勃興上有著很大功績的齊末遼東東北人僧朗法師來南方在棲霞山大破成實大乘師特別弘揚三論華嚴確立復興了什門的三論宗但僧朗的傳承不明到了陳隋時代達到全盛他們以中論百論十二門論為抉擇空有的基本論在這個根本思想上去溝通一切經論隋唐之間的嘉祥大師集三論之大成他的思想雖也採取成實大乘的許多精確的思想但加以極力的破斥他受北方地論宗南方攝論宗的影響不小他不但融合了真常的經典還以為龍樹無著是一貫的所以三論宗依舊是綜合學派研究三論的學者先要認識清楚學三論還是學三論宗如果學三論那三論宗的思想只可作參考因為他的思想是融合了真常的若學三論宗這就不單是三部論其他如淨名經法華經勝鬘經涅槃經等大乘經都是三論宗的要典判教修行斷惑位次佛性這些問題也都要理會明白如以為三論就是三論宗這是非常錯誤的第三系是陳代來南方的天台大乘南嶽慧思天台智者他們是從現在的平漢路南下的先到南嶽後到揚都再後到浙江天台天台宗也還是龍樹學之一思大師對般若經法華經二經並重智者大師比較上特重法華經涅槃經所以他判二經為最高最究竟這樣天台學者比較三論宗受真常的思想要格外濃厚北方的禪宗地論的思想而外又吸收了南方的成論三論攝論各派才組織他宏偉的體系因此天台宗是更綜合的學派智者大師對龍樹的大智度論有特深的研究對於南北的學派批判又貫攝能直接依據大小乘經把當時的學派思想作有系統而嚴密的組織他的精髓在止觀天台比三論確要充實些不過三論宗有許多思想卻比天台要接近龍樹學成實大乘與龍樹學相差太遠但與中國的佛教卻關涉很深三論天台都應該研究參考三論學者談二諦皆空有三種方言主要的意思一世俗中空自性執勝義中空假有執有人執假有是有體假有的執無體假但他們都以為假法不能沒有所以又執有實在的假體或假用為破假執故説勝義空假這是二諦盡破一切的情執二世俗空空自性的生滅不可得勝義中空不是空卻如幻的假有因果假有怎麼可破上面説空假其實是假執所以勝義中空的真義是即幻有而空寂顯示假名諸法的寂滅性此二諦是在世俗的緣起幻有上離去自性的妄計世俗中空顯示勝義的寂滅性勝義中空三世俗所説的空與勝義所説的空雖好像世俗中破自性執勝義中即假有而空寂其實是一個意義不是對立的從性空上説在緣起上離去情執世俗性空的真相就顯現出來勝義如暗去與明來並非二事所以説以破為顯從幻有説空卻自性才是緣起假名世俗緣起空寂其實空中不礙一切勝義這三種説明不過是一種方式而已懂得的人只一句緣有性空就是一句緣起也就夠了三論宗的空有是無礙的目的在説明緣起即空即假即中但説明上是側重於離一切執著顯示畢竟清淨的天台學者談緣起性空重視空假無礙的中道他説中諦統一切法立足在空有無礙寂然宛然的全體性離一切執是空宛然而有是假統合這空假二者是中這三者是舉一即三三而常一的中國人歡喜圓融總覺得天台的思想圓融理論圓融三論有所不及其實三論學者重中論只談二諦比較上要接近龍樹學天台的離妄顯真近三論統合一切之空有無礙是更與真常雜糅的五中論之組織我們若知一論的組織於全論的內容也就得到一個要略的概念但是科判中論是很難的古德每一品品的獨立不能前後連貫起來本論的中心在説明世出世間的一切法不像凡夫外道有所得小乘學者的所見在一一法上顯示他的無自性空空性遍一切一味相通達此空即通達一切所以論文幾乎是每品都涉及一切的但不能説完全沒有次第不從破的方式看看他所破的對象是什麼就可看出本論是全體佛法而以性空掃除一切執著本論以阿含經為對象阿含是根本佛教思想是我説緣起緣起是空諸行正見性空的緣起才能正見佛陀的聖教本論從性空緣起的見地建立佛教的一切有人以為龍樹專説一切法空這是錯誤極了龍樹的意見佛法世出世法不要説凡夫外道就是大部分的小乘學者也不知道像他們那樣説是錯的要理解一切法空才能正確的理解佛法的一切這可以説開發阿含的深義就是用性空無所得的智光顯示了真的佛教真佛教自然是真的聲聞乘也就是真的菩薩乘所以古人説三論是無所得小無所得大概略的説阿含經廣説緣起有從緣起有而略示本性空寂小乘阿毗曇不免離去本性空而説一切有大乘經從一一緣起有上開示法法的本性空本論從法法性空的正見中廣觀緣起法是大乘論而所觀所破是阿含經所開示的緣起有與小乘論師們的妄執也是大乘學者的開顯阿含經深義二十七品最初的兩頌是作者敬禮釋尊顯示佛説甚深緣起的大法能離一切戲論顛倒而得諸法的寂滅性最後有一頌是作者結讚世尊讚佛慈悲説此微妙深法令有情離一切見中間二十七品廣説緣起正觀大科分判三論宗依青目釋論前二十五品破大乘迷失明大乘觀行後二品破小乘迷執辨小乘觀行天台學者説本論以緣起為宗第二十六品正是説的緣起為什麼一定判為小乘所以通而言之全論二十七品同明佛法別而論之這可説前二十五品是明菩薩法第二十六觀十二因緣品明緣覺法後一品明聲聞法現在判中論不分大乘小乘因為性空義是三乘所共的初二品總觀八不的緣起法後面的諸品別觀八不的緣起總觀中第一觀因緣品重在觀集無生生死流轉因果相生是生生不已的緣起現在總觀一切法無生第二觀去來品重在觀滅不去涅槃還滅好像是從生死去入涅槃的現在總觀法法自性空沒有一法從三界去向涅槃後二十五品別觀四諦觀苦是性空觀集是性空等一觀世間苦有三品一觀六情品二觀五陰品三觀六種品這是世間苦果有情生起苦果就是得此三者本論所説的與五蘊十二處十八界的次第不完全相同卻是雜阿含經的本義六處五蘊六界和合名為有情這像舍利弗阿毗曇論法蘊足論都是處在蘊前的這是有情的苦體觀世間苦的自性空所以有此三品二觀世間集有十二品從觀染染者品到觀業品這又可分三類初五品明惑業所生説三毒三相有為相作業受報的人法皆空次兩品明生死流轉從因果的相續生起中觀察他的無三際非四作次有五品明行事空寂説了世間集就要進而談世間滅但世間集是否能滅呢顯示世間集的無自性空諸行無常無實在性這才可以解脫解脫也自然是假名非實的三觀世間滅有八品初觀法品明現觀觀一切法相無我我所離欲而悟入法性次觀時等三品明三乘的向得要經過幾多時間從因而果成不成就其實時劫因果成壞都是無自性的後四品講斷證斷證者是如來所破的顛倒所悟的諦理所證的涅槃是所這一切是性空如幻的四觀世間滅道有兩品就是觀諸法的緣起離一切的邪見這是本論的大科分判茲列表如下標宗最初二頌總觀觀集無生觀因緣品觀滅不去觀去來品觀六情品觀世間觀五陰品觀六種品染則生觀染染者品惑業所生觀三相品顯義觀作作者品作則受觀本住品觀燃可燃品觀世間集生死流轉無三際觀本際品非四作觀苦品諸行觀行品全論組織觸合觀合品行事空寂有無觀有無品別觀縛脫觀縛解品行業觀業品現觀觀法品觀時品觀世間滅向得觀因果品觀成壞品人觀如來品