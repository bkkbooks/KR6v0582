因過無始犯無窮過可是衆生都歡喜找個起頭元始找不到了就妄立一法如神我心物等為元始如來為對治這種戲論所以就説無始這無始是對有始説的意思説無有始有始不可得無始也就無有説有實性的無始這才有無窮過在中道正觀中始性不可得不妨説無始的最後又綜合的批評説現今沒有常怎麼會有無常沒有無常怎麼會有亦常亦無常又怎麼會有非常非無常呢辛二破邊無邊見壬一破有邊無邊見若世間有邊云何有後世若世間無邊云何有後世五陰常相續猶如燈火焰以是故世間不應邊無邊若先五陰壞不因是五陰更生後五陰世間則有邊若先陰不壞亦不因是陰而生後五陰世間則無邊世間是有情的身心身心在三相時劫的遷流中所以叫世間有情世間的五陰身到某一時候結束與後陰截然不同這是有邊又從此生死已盡也是有邊此中破前者前一五陰身完了後一五陰身又繼續下去這是無邊前一五陰延續下去這也是無邊今破後者生死盡的有邊相續的無邊假名中有前後截然不同或前陰無限的延續是外道妄見假名中也是沒有的假定世間是有邊的怎麼能夠有後世假定世間是無邊的又怎麼能夠有後世有邊所以沒有後世因現在五陰完了與後陰無關失去相續的意義無邊所以沒有後世因現有的世間無限發展下去後後世間就是前前世間所以後世也建立不起的如分別前後這其間必有他的不同五陰世間是常相續的不是即前為後也不是前後各別的完全脫離關係如燈火焰一直維持下去是他所依的油炷不息的放射看起來好像是前後一體沒有兩樣其實前一燈焰不是後一燈焰後一燈焰不是前一燈焰流動的燈焰沒有一念住而又能相續離前一燈焰就沒有後一燈焰所以又不能説前後焰是別體無關的這相似相續的燈焰喻各學派都採用以成立非有邊亦非無邊的不一不異的相續不過不以緣起假名説説有實在的法念念生滅必然發生困難無法成立諸法緣起假名猶如燈焰相依相續前焰非後焰而後焰又是不離前焰的所以在假名緣起中前後都有又都是無自性的這樣前焰後焰各各成立前後的燈焰間有邊不可得無邊不可得所以説以是故世間不應邊無邊本頌直依佛法緣起假名的相續義以顯出外道説的錯誤後五陰的生起因先五陰不因先五陰又先五陰壞了才生還是不壞而生假定是先五陰的自體壞了壞了就沒有不能因壞了的先五陰更生起後來的五陰這樣世間即不能相續成為有邊了如先五陰不壞即先者存在不失這當然也不因這不壞的先五陰生起另一後有的五陰一人那裡有二五陰呢後五陰不能是先來無限制的延續所以説世間則無邊此二頌可見執有自性的世間説壞説不壞都墮在邊見中壬二破亦有邊亦無邊見若世半有邊世間半無邊是則亦有邊亦無邊不然彼受五陰者云何一分破一分而不破是事則不然受亦復如是云何一分破一分而不破是事亦不然亦有邊亦無邊見是説世間一半是存在一半是不存在存在的繼續不斷的存在下去這是無邊不存在的到某階段結束了這是有邊假定世間真的一半是有邊一半是無邊那世間就成為亦有邊亦無邊的了可是事實上並沒有這回事所以説不然有邊無邊是約前後生命發展上講的若就五蘊和合上講叫做受者就五蘊的差別上講叫做受受者説他一分破一分而不破這是不可以的受法也是這樣性空者説受者是假名受法也是假名他不息的演變但不能決定説一半破一半不破的如我是隨所依的五蘊變化而變化的在這演變中五陰息息的變我也息息的變前我後我不是常住一體而他的某種主要因緣未變動以前他就現出安定統一的形態看來如此如此他離卻因緣不存在所以實際是依因緣的變動而變動他是緣起的所以有相待性似乎有變不變而他實是念念統一的前前非後後的也不能説半變半不變此意別當廣説壬三破非有邊非無邊見若亦有無邊是二得成者非有非無邊是則亦應成非有邊非無邊見依上亦有邊亦無邊而建立的如亦有邊亦無邊二者是可以成立的非有非無邊也應當可以成立如上所説亦有亦無邊是不成的所以非有邊非無邊也不得成己二結呵一切法空故世間常等見何處於何時誰起是諸見上説的諸見是從自性見而生起不合緣起假名也是因為不合無自性義本頌直接的揭示法性空義總遮一切在一切法的畢竟性空中世間是常是無常亦常亦無常非常非無常等的諸見都是錯誤的如悟人法空或了解依法性空而假名建立的世間知道一切緣起是無自性的無自性的緣起世間有什麼常無常可説也自然不會有此等邪見依假名緣起通達緣起法性空性空不壞緣起空間上無論是在何處時間上無論是在何時也不論是什麼人決不會起這些執見所以説誰起是諸見也可以説一切法性空寂中更有何處何時何人可説而能生此等邪見呢甲三歸宗瞿曇大聖主憐愍説是法悉斷一切見我今稽首禮八不緣起兩頌是標宗中間二十七品的偈頌是顯義這四句頌是歸宗標宗是標舉正宗顯義是開顯正宗歸宗是結歸正宗瞿曇大聖主是佛瞿曇是釋迦佛的姓大聖主是説佛是聖中之聖佛説最深法是八不緣起緣起是八不法一方面是假名有一方面是畢竟空性空假名在八不緣起中開示真實愚癡的衆生不理解因果罪福四諦事相所以就撥無一切不理解緣起性空所以就主張有極微色剎那心起我見法見執自我為我執諸法為法造種種業受輪回苦佛為憐愍這些有情所以為他們説八不的緣起法使他們從緣起法中悟解諸法空性悉斷一切有無常斷一異有邊無邊等的諸見證入寂滅龍樹菩薩見到緣起性空的殊勝是佛法的關要特據佛説加以發揮闡述使衆生更能把握緣起性空的心髓可是這甚深的緣起法唯佛方能開顯佛太偉大崇高太慈悲了所以向如來致敬説我今稽首禮
