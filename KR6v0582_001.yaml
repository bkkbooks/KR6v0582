樹學的特色完全抹殺這不過是自以為法性中宗而已龍樹論何曾如此説庚二遮破妄有辛一破壞四諦三寶壬一破壞四諦癸一總標若一切不空則無有生滅如是則無有四聖諦之法性空者的正義既明白顯示對於外人的責難不能接受要推還給他所以説堅持一切法不空的過失可太大了諸法有自性自己完成的自己如此的就沒有變化生滅如無有生滅也就無有四聖諦之法了癸二別釋苦不從緣生云何當有苦無常是苦義定性無無常若苦有定性何故從集生是故無有集以破空義故苦若有定性則不應有滅汝著定性故即破於滅諦苦若有定性則無有修道若道可修習即無有定性外人説我並不破壞四聖諦法我是成立一切法從因緣生的因果生滅為什麼説我破壞這一切呢論主説這是智慧淺薄自以為能立一切法其實是不能避免過失的自性不空特別如三世實有者一切法本來存在不是從因緣生而才有的既不從因緣所生試問怎麼會有苦苦是什麼意義無常是苦義經説以一切諸行無常故我説一切有漏諸受是苦不如意不愈快不安定不圓滿都是苦不但苦是苦樂也是苦不苦不樂的平庸心境也是苦苦上加苦是苦苦這是人人知道的快樂是無常的變動不居的才以為快樂一轉眼起了變化立刻就失壞快樂而悲哀了所以樂受是壞苦平庸的境界得之不喜失之不憂然而不苦不樂是行苦行就是遷流變易無常生滅的在不知不覺間走向苦痛如大海中無舵的小舟隨風漂流船中的人們儘管熟睡得無喜無憂等到船觸著了暗礁船破人沒的悲哀就來了所以享八萬四千大劫福報的非想非非想天的有情在他泯除想非想的差別住在平等寂靜的定中沒有一般的苦樂可是時劫遷流不斷的縮短他的生命這也到底在苦的圈子裡所以苦諦是成立於無常的如諸法決定有自性無常義不得成立無有無常苦也就不得成了根本佛教説四諦是這樣的苦苦的集苦集的滅苦滅的道以苦為出發的每一諦都説有苦字所以集滅道三諦不成本論都從苦説起假定説苦諦是有決定自性的那怎麼又是從煩惱業的集諦生呢苦自己有了照理就無須乎從煩惱業生所以説是故無有集集諦的所以不成立還不是因為有自性破壞了空義然而苦確實從集諦的煩惱業力的因緣生的緣生就是無自性的怎麼可説有定性呢假定還要説苦是有決定性的那生死苦痛就不應當有滅不但在地獄受苦的有情永遠在地獄受苦在人中受苦的有情永遠在人中受苦而且生死苦海的輪回也再不能有徹底的解脫證入涅槃執著苦有決定自性故苦即不可滅而破壞滅諦了如苦是有他決定的自性那不但破壞了集諦滅諦道諦也被破壞了所以説則無有修道為什麼要修道修道的目的是為對治煩惱滅除苦果這必須煩惱與苦陰身有改變的可能修道才能滅除他假使苦有定性集有定性不但道也是本有的而無道可修就是修道也不能滅除如承認佛法中有道可以修習那就無有定性可説了本論從苦諦實有定性以説明苦集苦集滅苦滅道的不可能集滅道三諦也都無有定性如有定性也是一切不成的癸三結成若無有苦諦及無集滅諦所可滅苦道竟為何所至這是總結無四諦的過失有苦諦就有集滅諦修道也就有到達的目的了如苦有定性就無有苦諦苦諦沒有自然也就無有集諦滅諦集滅諦沒有修所可滅苦的道諦究竟為何所至呢後二句似乎是説無有道諦然總連上文就知是説道無所到了修道是有目的的以四諦來説道是所修的集是修道所要斷的滅是修道所要到達證實的苦是道所要解脫的苦集滅三諦都沒有了修道不是無所趣向了嗎壬二破壞四諦事若苦定有性先來所不見於今云何見其性不異故如見苦不然斷集及證滅修道及四果是亦皆不然是四道果性先來不可得諸法性若定今云何可得有四諦就有修四諦的人有修四諦的人就有修四諦的事見苦斷集證滅修道如實有論者説諸苦決定有自性的那就一切衆生在沒有修四聖諦之先既從來不曾見到苦諦不見即不再能見現今修道又怎樣能夠見呢苦是實有的其性沒有變異所以先前沒有見即苦性永不可見現在也不應該有見苦的道行了如見苦不可能斷集也就不能斷證滅也無所證本不修道當然現在也無道可修了修四聖諦行尚且不可得由修而得的四果自然也是不然的進一步説四沙門道四沙門果的體性凡夫在未修之先本來是不可得的這是誰也不能否認的一切諸法的自性若執著是決定有的那不得即不能得現今又怎麼可以得呢理由還是一樣有決定性性即不可變異所以不可得就永不可得了這可見決定有自性論者四諦行果都被破壞了壬三破壞三寶癸一正明三寶無有若無有四果則無得向者以無八聖故則無有僧寶無四聖諦故亦無有法寶無法寶僧寶云何有佛寶如上所説沒有所得的四果也就沒有能得四果趣向四果的人了所以説則無得向者四得四向是出世的八賢聖也就是佛教中的僧寶所以如沒有四得四向無有八賢聖也就無有鼎足而三住持佛法的僧寶了進一步説沒有苦集滅道的四聖諦也就無有解脫所由的法寶了法寶僧寶都沒有了又那裡還有創立僧團弘布正法的佛寶呢況且佛也是依法修習而成居於僧數中的所以説一切皆空沒有破壞三寶而説諸法有自性反而三寶不能成立了癸二別顯佛道無成汝説則不因菩提而有佛亦復不因佛而有於菩提雖復勤精進修行菩提道若先非佛性不應得成佛自佛教出現於世間説後代的佛弟子都在追仰佛陀的遺風發揚佛陀行果的大乘所以特別一論佛寶菩薩久劫修行得阿耨多羅三藐三菩提所以名佛如照實有論者