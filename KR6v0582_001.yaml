如眼有分別色的作用耳有分別聲的作用受有分別苦樂的作用想有取相構畫的作用等外人所以要建立本住的我無非要成立身心的作用現在沒有本住眼等的作用已有了還要本住做什麼呢辛二即法無人破壬一敘轉救若眼等諸根無有本住者眼等一一根云何能知塵外人轉救説如説眼等各各有他異相不同的分別作用所以不要本住這是不可以的假使真的眼耳等的諸根苦樂等的諸法沒有本住去統一他使用他這眼等的一一根怎麼能知道外界的一一塵呢眼等根之所以認識色等塵這是由我去使用根的關係可以説眼等根是認識的工具他本身是沒有認識作用的這見解近於常識的見解常人大抵以五官為司理外界的五個官職內在還有一個支配統一者這統一者就是外道所説的神我壬二破邪執見者即聞者聞者即受者如是等諸根則應有本住若見聞各異受者亦各異見時亦應聞如是則神多眼耳等諸根苦樂等諸法所從生諸大彼大亦無神這是破斥外人的轉計照外人的意思説眼根中有我説眼見是見者耳根中有我説耳聞是聞者感受中有我説感受是受者那麼這見聞覺知的我是一還是多如是一這就應該見者即是聞者聞者也即是受者這有什麼妨難呢不知道承認了本住是一在和合的身心作用中就成為混亂因為眼見者不但有見也應該可以聽耳聞者不但是聞也應該可以見本住既然是唯一的何必此見彼聞有差別的作用必須如是等諸根互用才可説有本住但事實上見者是見者只有他的見用並不能聞聞者是聞者只有他的聞用並不能見所以説本住是一這是不合理的也可見本住不能成立假定説見者是見者聞者是聞者受者是受者想者是想者知者是知者覺者是覺者見聞覺知者是各各差異的受想者也是各各別異的那麼見者見的時候不但有見也應當有聞因為見聞者是各異的既然見者與聞者各別那見者見時自然也不妨礙聞者的能聞反過來説聞者聞的時候不但有聞也應當有見聞見者是各異的所以聞者聞自也不妨礙見者的能見這樣説諸根中受想中可以同時有很多的知覺神我本住就成為衆多了所以説如是則神多這樣的破斥因為空宗的法相同於上座系的舊義見時只能見聞時只能聞五識不共生與意識也不同時起所以中觀家不用唯識家五識同時可以發生作用的理論假使承認同時能起五識雖可以破斥外人的同時多我外人也可以反破佛法的同時多心了數論外道立二十五諦其中有地水火風空的五大五大是由自性的轉變而生的五大從五塵生五大又生五知根五作業根及意根一般的身心知覺作用都是依五大而起的所以眼耳等的諸根苦樂等的諸法是五大所從生的諸大是能生的此中説的諸大不是佛教的四大而是數論的五大説假定是指佛法的四大説只可説所造的眼耳等諸根從能造的諸大生不可説苦樂等的心心所法也從四大生現在既説根等苦等從諸大所生可見是指數論外道的五大説論主上面從神不離身心而約一神多神作難現在再指出身心的能生諸大中也無神所以説不但從諸大所生的眼等根苦等法沒有實在的我彼能生的諸大也是無有神我的大中尚且無我所生的身心中又怎會有我呢壬三顯正義若眼耳等根苦樂等諸法無有本住者眼等亦應無前離法無人破的顯正中是依法有我無的思想而顯示的這即法無人破的顯正中是依我空即法空的思想而顯示的我法是相因相待的假名有並沒他的實自性外人雖也採取因人知法因法知人的相待安立但他執有實自性所以上面也破斥了他的相待這裡是説假使眼耳等的諸根苦樂等的諸法中沒有實在的本住本住沒有那裡還有眼等苦樂等的諸法呢所以説眼等亦應無前者是破人我顯示了我空後者是破法我顯示了法空在清辨論中沒有這顯正的一頌破後接著就是結呵似乎要文氣相接些現在依青目釋本頌所以別判為顯正庚二結呵眼等無本住今後亦復無以三世無故無有無分別外人説在眼等諸根苦等諸法前先有本住在上面的諸頌中以種種的方法觀察尋求成立在眼等之前並沒有實在的本住眼等以前即是過去的由過去的尋求不可得現在眼等中未來眼等以後也當然同樣的不可得所以説今後亦復無過去現在未來的三世中均無所有那就可以確定的説本住是於一切時中無所有的若無所有那裡還可分別本住是先有今有後有呢如石女兒根本是沒有的當然不可分別他是黑是白是高是矮了觀燃可燃品第十觀作作者品説明了作業的作者不可得觀本住品説明了受用的受者不可得本品觀燃可燃是約喻總顯作受者的空無自性燃是火可燃是薪燃可燃就是火與薪以火與薪比喻我與五蘊因此也可説前二品是依法破這品是就喻破外道及小乘的犢子系都愛用薪火喻建立他的我佛世破外道的神我是以離蘊即蘊的方法顯示我不可得所以他們就用不即不離的燃可燃喻解救自己意思是説離了可燃就沒有燃但也不能説燃就是可燃燃與可燃是不即不離的五蘊可燃和合有我燃也是這樣説離五蘊別有一我是不可但説我即是五蘊也同樣是不可我與五蘊是不即不離的雖不離五蘊但也不就是五蘊中觀家説不即不離的緣起我與外道犢子系説的不即不離的神我及不可説我有什麼不同一他們説的我總覺得是有實在性的或者是神妙的中觀家説的我是如幻如化緣起假名的二他們説不即不離的燃可燃喻主要的是建立他們的我實有而不是為了成立五蘊中觀家説五蘊和合的我不但我是不即五蘊不離五蘊就是五蘊也是不即假我不離假我的五蘊與假我一切都是相依而有