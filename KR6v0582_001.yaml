可見燃與可燃在實有自性的意見下觀待是多餘的各有自性是不能成立相待的一般人的見解以為先有燃燒的火後有可燃燒的柴這是不通的如火與柴同時都在也不能説他有相待的所以大都以為因可燃而有燃不知道這種看法仍免不了過失一重成過在燃可燃還沒有觀待以前説已有可燃這等於已意許燃的存在如沒有燃怎麼會有可燃呢既已有了燃而現在又説因可燃而有燃這不是犯了燃的成而復成的過失嗎所以説則燃成復成反之可燃之所以稱為可燃是因燃而成為可燃的現在説因可燃而後有燃那又犯了第二不成過因為因可燃而有燃就是那可燃中根本無有燃如可燃中沒有燃可燃就不成可燃那又怎麼可説因可燃有燃呢壬二破待已而成若法因待成是法還成待今則無因待亦無所成法若法有待成未成云何待若成已有待成已何用待外人想已成確是不須觀待的觀待也不可能這應該是相待而後成就是因待而後有自性但這還是不成立的因待該是二法相待的假定甲法是因待乙法而成的而甲法又還成為乙法所待的因緣甲乙二法有他的交互作用方可説為因待現在既主張待已而成那就根本沒有一法可作為因待的對象無所待的因那因待所成的果法當然也就沒有了所以燃與可燃並不能因觀待而成立假定還要説甲法是有所待而成的縱然有乙可待但在甲法未待以前就是自體未成既甲體未成憑什麼去與乙相待呢假定又改變論調説甲法先已成就而後有待這更不通法已成就了還要用因待做什麼因待的作用是為了成立呀所以如説燃與可燃有自性因相待而成從未成已成中觀察都不能建立辛三因不因門因可燃無燃不因亦無燃因燃無可燃不因無可燃這頌是總結上義的上面破燃與可燃是各各獨立的又破成已而待待已而成現在就以因不因待門結破意思是説因待可燃而後説有燃這燃就沒有自性不因待可燃而説有燃這燃也不可得反過來説因待燃而後有可燃這可燃沒有自體不因待燃説有可燃也是無有可燃的辛四內外門燃不餘處來燃處亦無燃可燃亦如是餘如去來説內外就是從來去中觀察火由什麼地方發出火不能離木而生所以不是由外加入像鳥來棲樹但樹木中也還是沒有火所以也不像蛇從穴出平常説析木求火不可得就是這個意思火是怎樣有的是在某種條件具備之下發生的不內不外亦不在中間是因緣有的所以燃不從其餘的地方來入可燃中可燃處也沒有燃可得燃是這樣可燃也是這樣可燃的所以成為可燃不是外力使他成為可燃也不是可燃本身就這樣具有不來是不從外來不出是不從內出也就是不去以時間説已燒沒有燒未燒也沒有燒離已燒未燒燒時也沒有燒所以説餘如去來説清辨論釋及青目長行都約三時説解説餘如去來説其實去來一句可以包括更多的觀門辛五五求門若可燃無燃離可燃無燃燃亦無可燃燃中無可燃本頌應還有一句可燃中無燃五求的意義才完備佛在時研究有沒有我就應用這一觀法如火與柴假使説柴就是火火在柴中尋求定不可得離柴外沒有火這更是盡人所知的所以在五蘊中求我固然是沒有離了五蘊去求我同樣是沒有的所以説若可燃無燃離可燃無燃這即蘊離蘊的二根本見顯然是不成立的印度的外道立五蘊是我這是很少的大都是主張在身心外另有一實我其實這是不能證明成立的試離了身心的活動又怎麼知道有神我或靈魂有的執著説我與五蘊雖然是相離的但彼此間有著某種關係可以了知所以説有我為主體但既然我法相依而別有以我為本體該是法屬於我我有於法了燃如我可燃如身心如説有身心屬於我等於説柴是屬於火的但柴並不屬於火所以説燃亦無可燃這樣我也不應為身心之主而有身心了並且我法是不同的我是整體的法是差別的我法相依而有那是我中有法呢還是法中有我呢假定説身心當中有我尋求起來是不可得的所以應加一句説可燃中無燃也不是我大而身心小身心在我中所以説燃中無可燃這五門觀察顯出即蘊離蘊依五蘊的我了不可得中觀家破即蘊離蘊的我有時依釋尊古義以三門破有時又以五門破到月稱論師用七門破但總歸不出一異二門庚二結顯性空以燃可燃法説受受者法及以説瓶衣一切等諸法若人説有我諸法各異相當知如是人不得佛法味上以燃可燃法説明受的五陰法及受者的我不可得其他如瓶與泥衣與布等這一切諸法也應作如是觀佛教的其他學派有説假依於實和合的假我沒有假我所依的實法不是沒得在中觀家看來凡是有的就是緣起的存在離了種種條件説有實在的自性法是絶對不可以的所以依燃與可燃的見地觀察我與法自我與彼我此法與彼法都沒有真實的別異性一切是無自性的緣起從緣起中洞見一切無差別的無性空寂才能離自性的妄見現見正法得到佛法的解脫味因此若人説有我是勝義我是不可説我是真我或者是依實立假的假我又説諸法的各異相以為色心有為無為等法一一有別異的自性那是完全不能了解緣起當知如是人不得佛法味如入寶山空手回該是不空論者的悲哀吧觀本際品第十一從此以下二品以相續的生死為境而加以正理的觀察現在先觀察本際釋尊在經上説衆生無始以來生死本際不可得什麼叫本際為什麼不可得本際是本元邊際的意思是時間上的最初邊是元始衆生的生死流只見他奔放不已求他元初是從何而來的卻找不到時間的元始找不到而世人卻偏要求得他約一人的生命説是生命的元始邊際約宇宙説是世界的最初形成在現象中尋求這最初的最究竟的或