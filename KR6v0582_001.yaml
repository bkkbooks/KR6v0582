此意總而言之是不可思議實相是自覺的境界一切所取相離能見相也不可得一般人所以不能體解實相就因為常人的認識有能知所知能説所説的對立有所知就不能知一切能知是非所知的約一念説所以實相的自覺是泯絶能所融入一切中去直覺一切的如此境地如何可説要説就必有能所彼此了所以法華經説諸法寂滅相不可以言宣但為了使人趣向實相體悟實相又不得不從世俗假名中説世俗的心知言説都不能道出實相的一滴所以宣説實相的方式是從遮詮的方法去倣佛他的對虛妄的生死説涅槃的真實一切法有生有滅無常故苦要解脫生老病死不生不滅才是涅槃一分學者不知如來方便的教意以為有生有滅是世間克制了起滅的因不起生滅的苦果就達到不生不滅的出世涅槃了涅槃是滅諦是無為是與一切有為生滅法不同的這樣的意見實是不解佛意其實涅槃即諸法實相不是離一切法的生滅另有這真常不變的實體不過常人不見諸法實相佛才對虛説實説生滅應捨涅槃應求如從緣起而悟解空性那就無自性的緣起生滅的當體本來即是不生不滅的體達此無自性生滅的空性也就是實證不生滅的涅槃了何曾別有涅槃可得涅槃是不生滅的寂靜離戲論的一切學者都能信受但大抵以為離一切法而別有所以現在説無生亦無滅寂滅如涅槃寂滅是生滅動亂的反面不要以為涅槃如此一切生滅法不如此佛法是即俗而真的即一切法而洞見他的真相一切法即是寂滅如涅槃的這裡説如涅槃是以一般小乘學者同許的涅槃以喻説實相的依性空者的正見諸法實相寂滅即涅槃不止於如呢己二方便假名説庚一趣入有多門一切實非實亦實亦非實非實非非實是名諸佛法實相寂滅離言那又怎樣能引導人去體悟呢佛有大悲方便能言隨世俗心不違實相依世俗相待説法引入平等空性所以實相無二無別而佛卻説有看來不同的實相令人起解修觀不同的觀法都可以漸次的深入悟證實相本頌是名諸佛法一句在大智度論中作是名諸法之實相可見這是不同的解説實相佛陀是善巧的適應衆生根性的不同説有多種不同的方法依本頌所説歸納起來不出三大類一一切實非實門二亦實亦非實門三非實非非實門古代的天台三論學者根據本頌説有四門入實相即一一切實門二一切非實門三亦實亦非實門四非實非非實門依天台者説一切實即藏教以有為無為一切法都是真實的一切非實即通教説一切法都是虛假而不實在的依此二門而悟入的諸法實相即真諦亦實亦非實是別教真俗非實非有非空的中道是真實非實非非實是圓教三諦無礙待絶妙絶依後二門而悟入實相的是中諦依三論者説四門都是方便因此悟入四門常絶是一味的實相三論師也用三門解説本來世俗的緣起假名是相待的凡有所説明必至四句而後完備如説一有二無三亦有亦無四非有非無第一句是正第二句是反第三是綜合但又成為正的第四句是超越又成為反的此四句有單有復有圓如三論家所常説的然歸納起來只有兩句一有正二無反所以佛稱世俗名詮所及的為二佛依世俗而指歸實相也不出二門一常人直覺到的實有性是第一句超越此實有妄執性的空也可以稱之為無是第二句世法與佛法的差別即世間二句是橫的相對的佛意是豎越的指向絶對的所以如對有名無有空無的相那縱然説空無自性也非佛意了如説為四句第三句的亦有亦無就是第一句的有有有與有無第四的非有非無即是第二句的無無有與無無解作相對即落於四句都不能解脫不見佛意如領解佛意離彼不住此那非有非無即不墮四句無或空非有非無即入不二法門然清辨與青目都判説本頌為三門的確龍樹歸納聲聞者的思想也是用三門的這因為本頌是總攝聖教而聖教的詮辨必是依二不能單説實或者非實而説明其性質的所以依實與非實而説明的時候不出三門一一切實非實是差別門這是説一切法什麼是真實的什麼是非真實的真實與非真實是有他的嚴格的界限如説一切法是真實有的一切法中的我是非真實的或者説一切世間法是不真實的一切出世法是真實的或者説於一切法所起的遍計執性是非真實有的依他圓成實性是真實有的這可以有種種不同但彼此差別的見地主導一切這大體是為鈍根説法般若經説為初學者説生滅如化不生滅不如化即是此等教門不如化就是真實的一切法中生滅是不真實的不生滅是真實的或者説生滅是用不生滅是體生滅用是依他起是虛妄分別性不生滅體是圓成實二亦實亦非實這是圓融門中國傳統的佛學者都傾向這一門天台家雖説重在非實非非實門而實際為亦實亦非實如天台學者説言在雙非意在雙即這是明白不過的自供了實即是非實非實即是實或者説即空即假或者説即空即假即中或者説雙遮雙照遮照同時這都是圓融論者三非實非非實是絶待門待凡常的實執強説非實實執去非實的觀念也不留如草死雹消契於一切戲論都絶的實相此為上根人説中觀論即屬於此修行者依此三門入觀凡能深見佛意的門門都能入道否則這三門即為引人入勝的次第為初學者説世俗諦中緣起法相不亂以此為門觀察什麼是實有什麼是非實有假有分別抉擇以生勝解進一步入第二門觀緣起法中所現的幻相自性不可得雖無自性而假相宛然於二諦中得善巧正見以緣起故無自性以無自性故緣起空有交融即成如實觀再進一步入第三門深入實相的堂奧而現證他即有而空還是相待成觀不是真的能見空性所以即有觀空有相忘而空相不生豁破二邊廓然妙證不但空不可説非空也不可説大智度論説諸法有是一邊諸法無是一邊離是二邊行中道是名般若波羅蜜都指此門而説釋尊的開示不外乎引入實行實證所以從修學入證的過程上分為這三門中國一分學者不解教意不知一切教法都是為衆生説的於是乎附合菩薩自證境的階位初見真次入俗後真俗無礙事事無礙反而以非實非不實的勝義為淺近不知未能透此一關擬議聖境是徒障悟門呀青目説亦實亦非實為下根人説的一切實非實為中根人説的非實非非實為上根人説的三者的次第不順所以依清辨論釋改正庚二證入無二途辛一約勝義説自知不隨他寂滅無戲論無異無分別是則名實相如能得意證入三門所體悟的實相還是同一的不可以説有差別所悟入的實相心行言語斷一頌已略示大意現在再為詮説先從勝義説次從世俗説勝義説明聖者自覺的智境世俗説明聖者悟了第一義所見緣起法相的一切如幻境界這雖可以言説詮表然也大大的不同於凡愚所見圓滿的無礙通達二諦唯有佛陀自知諸法的真相是自己體悟到的有自覺的體驗不隨他是不以他人所説的而信解古代禪宗的開示人多在勦絶情見讓他自己去體會如對他説了他就依他作解以為實相是如何如何其實與實相不知隔離了多遠正覺實相是內自所證如人的飲水冷暖自知不是聽説水冷而以為冷的寂滅是生滅的否定生滅是起滅於時空中的動亂相悟到一切法的本來空性即超越時空性所以説寂滅肇公説旋嵐偃嶽而常靜江河競注而不流也可説能點出即生滅而常寂的實相了無戲論根本是離卻一切的自性見因此一切言語分別的戲論相都不現前在自覺的境地沒有差別性可説是一切一味的所以説無異我們聽説無異就想像是整體的這不是實相的無異反而是待異的無異無異恰好是異與異不同龍樹説破二不著一如離了差別見又起平等見一體見這怎麼可以世間的宗教或哲學者每同情於一元論這雖有直覺經驗也是不夠正確因為執萬有混然一體每忽略了現實的一面唯有佛法超脫了諸法的差別相而不落於混然一體的一元論無分別是説諸法的真性不可以尋思的有漏心去分別他能具備自知不隨他寂滅無戲論無異無分別的六個條件是即名為實相般若的現證辛二約世俗説若法從緣生不即不異因是故名實相不斷亦不常唯佛與佛乃能究盡諸法實相實相即是如是性如是相如是因緣果報等這是法華經所説的要知道實相即緣起的真相常人不解緣起而執有自性所以如本論的廣説一切法實相皆空畢竟空寂當然是緣起的實相然而緣起而寂滅同時又即緣起而生滅緣起法是雙貫二門的緣起的自性空寂是實相緣起的生滅宛然何嘗不是實相否則就不免偏墮空邊了徹底的説説緣起法自性畢竟空也即是成立諸法的可有使衆生改惡修善離有漏而向無漏所以這要説實相的因緣生法悟了如實空相從畢竟空中達世俗的緣起幻有從空出有從般若起方便徹底的正見諸法的如幻如化這樣的世俗不是無明所覆的世俗而是聖者的世俗有了沒有一法不是相互關係的存在一切是重重關係的幻網所以依佛所悟而宣説的是緣起諸法是從因緣所生的緣與緣所生的果法有因果能所因有因相果有果相果是不即是因的但果是因的果也非絶對的差別所以又是不異因的不一不異就是因果各有他的特相而又離因無果離果無因的因果關涉的不一不異即名為實相緣起幻相確實如此解因為因果的不一不異所以一切法在因果相續的新新生滅中如流水燈焰即是不斷亦不常的因不即是果所以不常果不離於因所以不斷不一不異是自他門不斷不常是前後門此二門即可以通解時空中的一切而此二者又成立於緣生的基點上緣生即無自他共無因生不生不滅是有無門自他門是橫的前後門是豎的有無門是深入的緣起實相如此此與畢竟空性融通無礙阿羅漢及證無生忍的八地菩薩能如實見諸法的如幻如化戊三入法之益不一亦不異不常亦不斷是名諸世尊教化甘露味若佛不出世佛法已滅盡諸辟支佛智從於遠離生如上所説不一不異不常不斷的實相就是即俗而真的緣起中道如有修行者通達了那就可以滅諸煩惱戲論得解脫生死的涅槃了所以此緣起的實相即諸佛世尊教化聲聞弟子菩薩弟子的妙甘露味甘露味是譬喻涅槃解脫味的中國人説有仙丹吃了長生不老印度人説有甘露味吃了也是不老不死的今以甘露味作譬喻世間的仙藥那裡能不老不死佛説的緣起寂滅相即實相與涅槃才是真的甘露味得到了可以解脫生死不再輪回了這甘露味為佛與弟子所悟的佛所開示而弟子們繼承弘揚的也是這個所以佛法不二解脫味不二三乘是同得一解脫的佛與聲聞弟子同悟一實相不過智有淺深有自覺或聞聲教而覺罷了這一世間所流布的佛法創於釋迦牟尼佛佛的教法在推動如來法輪的佛子當然是求正法久住於世的不過諸行是無常的佛法流行到某一階段還是要滅的佛説的法門在長期的弘傳中經過許多次的衰微與復興但久了漸漸的演變失去了他的真義有佛法的名沒有佛法的實如不尊重根本時時喚起佛陀的真諦那就要名實俱滅了世間沒有了佛法經過多少時候又有佛陀出世重轉法輪佛教在世是這樣的在前佛滅度後佛未出世佛的教法也已滅盡的時期也還有悟解緣起實相的聖者名辟支佛辟支佛譯為緣覺或獨覺約覺悟諸法緣起説名緣覺約不從師教能自發的覺悟説名獨覺辟支佛雖自覺緣起的真相雖近於佛但他不説法不能創建廣大普利的佛教不過獨善其身而已這辟