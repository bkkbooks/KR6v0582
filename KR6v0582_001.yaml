body:
  text: 民國三十一年講於四川法王學院懸論一中論作者釋者與譯者一作者本論的作者是龍樹菩薩他本是南印度的學者又到北印度的雪山去參學他正確的深入了南方佛教所重的一切法性空於北方佛教所重的三世法相有也有透闢的觀察所以從他的證悟而作為論説就善巧的溝通了兩大流先分別諸法後説畢竟空他是空有無礙的中觀者南北方佛教的綜貫者大小乘佛教的貫通者這樣綜貫的佛法當然是宏偉精深無比龍樹曾弘法於中印但大部分還是在南印南憍薩羅國王引正王是他的護持者當時的佛教在他的弘揚下發生了劃時代的巨變原來龍樹以前的大乘學者雖闡揚法法空寂的深義但還缺少嚴密的論述到龍樹建立精嚴綿密的觀法批評一般聲聞學者的似而非真確立三乘共貫的大乘法幢顯著的與一般聲聞學者分化所以在印度大乘學者都尊他為大乘的鼻祖在中國也被尊為大乘八宗的共祖他的作品很多可分為二大類一抉擇深理的如中論七十空性論六十如理論回諍論等這都是以論理的觀察方式開顯諸法的真實相二分別大行的如釋般若經的大智度論釋華嚴經十地品的十住毗婆沙論這都是在一切空的深理上説明菩薩利他的廣大行把這兩類論典綜合起來才成為整個的龍樹學現在講的中論是屬於抉擇深理的並且是抉擇深理諸論的根本論所以有人稱龍樹系為中觀派後起的大乘學派爭以龍樹為祖這可見他的偉大但也就因此常受人的附會歪曲如有些論典本不是他的作品也説是他作的真諦三藏的十八空論內容説十八空也談到唯識有人看見談空就説這是龍樹作的也就因此説龍樹宗唯識其實十八空論是真諦的中邊分別論相品的一分與真實品的一分傳説為龍樹造可説毫無根據還有釋摩訶衍論是大乘起信論的注解無疑的是唐人偽作無知者也偽託為是龍樹造的還有密宗的許多偽作那更顯而易見不值得指責了我們要理解龍樹的法門唯有在他的作品中去探索不是他的作品應當辨別把他踢出龍樹學外這才能正確而純潔的窺見他的本義二釋者本論的釋者舊傳有七十餘家近據西藏的傳説共有八部一無畏論有説是龍樹自己作的其實不是這可從論中引用提婆的話上看出來二依無畏論而作的有佛護的論釋三依佛護論而作的有月稱的顯句論四清辨論師的般若燈論五安慧的釋論六提婆薩摩的釋論七古拏室利的釋論八古拏末底的釋論前四論是中觀家的正統思想後四論是唯識學者對中觀論的別解我國譯出的中論釋主要是什公所譯的青目論釋這與西藏傳的無畏論相近文義簡要可説是最早出的釋論還有唐明知識譯的清辨的般若燈論宋惟淨等譯的安慧的中觀釋論都可以參考無著的順中論略敘中論的大意真諦譯過羅睺羅跋陀羅的釋論既沒有譯全譯出的部分也早已散失了三譯者現在所用的講本是鳩摩羅什三藏譯的什公七歲的時候跟他的母親從現在新疆的龜茲國出發通過蔥嶺到北印的罽賓去學佛法住了三年由罽賓返國路經現在新疆的疏勒小住幾天遇到了大乘學者莎車王子須利耶蘇摩須利耶蘇摩在隔房讀大乘經什公聽到空阿不可得啦很是詫異覺得這與自己所學的有部阿毗曇不同於是就過去請教與他辨論結果接受了他的意見從他學習龍樹菩薩的中論十二門論等大乘性空經論在姚秦的時候來我國弘化就把性空的典籍傳入我國他的譯述影響中國大乘佛教很深幾乎都直接間接的受了他的影響假使不是什公的傳譯中國佛教決不會是現在這樣我們從世界文化史上看這樣的大法由一個十多歲的童真接受而傳播可説是奇迹特別是龍樹的大智度論與十住毗婆沙論虧他的傳譯而保存到現在我們對於他的譯績應該時刻不忘本論是從什公在長安逍遙園譯的青目論釋中節出青目論釋什公門下的哲匠像曇影僧睿他們認為有不圓滿的地方曇影的中論疏舉出他的四種過失所以現存的長行是經過什門修飾了的二略釋中觀一直説本論簡名中論詳名中觀論論的內容暢明中觀從所詮得名所以稱為中觀論中是正確真實離顛倒戲論而不落空有的二邊觀體是智慧觀用是觀察體悟以智慧去觀察一切諸法的真實不觀有無顛倒的知諸法實相慧名為中觀阿含經八正道中的正見正觀就是這裡的中觀正就是中見就是觀正見即中觀是一而二二而一的觀慧有三聽聞讀誦聖典文義而得的聞所成慧思惟抉擇法義而生的思所成慧與定心相應觀察修習而得的修所成慧還有現證空性的實相慧觀是通於先後的那麼不與定相應的聞思抉擇諸法無自性也叫做中觀尤須知道的定心相應的有漏修慧同樣的是尋求抉擇觀察不但是了知而已觀的所觀是中就是緣起正法正確的觀慧觀察緣起正法而通達緣起法的真實相所以中觀就是觀中本論所開示的是正觀所觀的緣起正法這可從本論開端的八不頌看出先説了八不接著就稱讚佛陀的能説是八不因緣緣起是諸説中第一八不是緣起的真相八不的緣起才是佛説的緣起正法緣起是説一切法皆依因託緣而生起而存在沒有一法是無因而自性有的這在阿含經中佛特別的揭示出來有外道問佛説什麼法佛就以我説緣起我論因説因答覆他這是佛法的特質不與世間學術共有的佛弟子必須特別的把握住他緣起是因果性的普遍法則一切的存在是緣起的這緣起的一切廣泛的説大如世界小如微塵一花一草無不是緣起扼要的説佛教的緣起論是以有情的生生不已之存在為中心的佛説緣起是説明生死緣起的十二鉤鎖此有故彼有此生故彼生此無故彼無此滅故彼滅即緣起的定義所謂無明緣行行緣識純大苦聚集無明滅則行滅行滅則識滅純大苦聚滅這是緣起的內容緣起是一切而衆生對緣起的認識是否正確可以分為三類一凡夫身心的活動一切的一切無不是緣起但日坐緣起中受緣起法的支配而不能覺知是緣起也就因此得不到解脫二聲聞佛對他們説緣起他們急求自證從緣起因果的正觀中通達無我我所離卻繫縛生死的煩惱獲得解脫他們大都不在緣起中深見一切法的本性空寂而從緣起無常無常故苦苦故無我我所的觀慧中證我空性而自覺到我生已盡梵行已立所作已辦不受後有他們從緣起的無常離人我見雖證入空性見緣起不起的寂滅然不能深見緣起法無性所以還不能算是圓滿見緣起正法三菩薩知緣起法的本性空於空性中不破壞緣起能見緣起如幻能洞達緣起性空的無礙真正的聲聞學者離欲得解脫雖偏證我空也不會執著諸法實有但未離欲的或者執著緣起法的一一實有或者離緣起法而執著別有空寂執有者起常見執空者起斷見都不能正見中道般若經説菩薩坐道場時觀十二因緣不生不滅如虛空相不可盡是為菩薩不共中道妙觀菩薩以此不共一般聲聞的中道妙觀勘破非性空的實有非緣有的邪空不落斷常通達緣起的實相菩薩的緣起中道妙觀就是本論所明的中觀有人説緣起是佛教的核心我們説明他就可以了何必要大談其空呢這太把緣起看簡單了阿含經説十二緣起甚深甚深難見難了難可通達而緣起之寂滅性更難了知更難通達要知道生死的流轉涅槃的還滅都是依緣起的世間而開顯的從緣起的生滅方面説明世間集此有故彼有此生故彼生生死相續的因果不外惑業苦的鉤鎖連環生生不已的存在是雜染的流轉從緣起的寂滅方面説明世間滅此無故彼無此滅故彼滅生死狂流的寂然不生體現了緣起的寂滅性是清淨的還滅可以説因為緣起所以有生死也就因為緣起所以能解脫緣起是此有故彼有也就此無故彼無緣起扼要而根本的啓示了這兩面一般聲聞學者把生滅的有為寂滅的無為看成隔別的所以也就把有為與無為主要是擇滅無為生死與涅槃世間與出世間看成兩截不知有為即無為世間即出世間生死即涅槃所以體悟緣起的自性本來是空寂的從一切法的本性空中體悟世間的空寂涅槃的空寂這世間與涅槃的實際無毫釐差別般若經的色即是空空即是色也就是這個道理緣起的自性空是一切法本來如是的名為本性空一切法是本性空寂的因衆生的無始顛倒成生死的戲論戲論息了得證涅槃的寂滅其實是還他個本來如此緣起自性空所以説緣起的實性是空的性空的妄相是緣起的如果不談空怎能開顯緣起的真相怎能從生滅與寂滅的無礙中實現涅槃的寂滅本論開顯八不的緣起所以建立世俗諦中唯假名勝義諦中畢竟空因此龍樹學可以稱為性空唯名論緣起法是世間的一切緣起的因果事相衆生已經是霧裡看花不能完全了達緣起法內在的法性更是一般人所不能認識的佛陀悟證到緣起的真相徹底的開顯了甚深的法性就是三法印三種真理從緣起生滅的非常上顯示了剎那生滅的諸行無常緣起是有情為本的從緣起和合的非一上開示了衆緣無實的諸法無我從緣起的非有不生的寂滅上闡明了無為空寂的涅槃寂靜緣起法具體的開顯了三法印是即三即一而無礙的後世的學者不知緣起就是空諸行從實有的見地上去解説側重生滅無常印的與涅槃無為脫了節側重寂滅真常的也不能貫徹生滅無常緣起以有情為本所以阿含經特別側重了有情無實的諸法無我如果深刻而徹底的説有情與法都是緣起無自性我的這就到達了一切法空的諸法無我這不是強調不是偏重只是阿含經空諸行的圓滿解説這一切法空的諸法無我貫徹了無常與真常即空的無常顯示了正確的緣起生滅即空的常寂顯示了正確的緣起寂滅凡是存在的必是緣起的緣起的存在必是無我的又必是無常的空寂的唯有從性空的緣起中才能通達了三法印的融然無礙他貫通了動靜與常變掃除了一切的妄執龍樹論特別的顯示一切法空就是緣起的一實相印從即空的緣起去談三法印才知三法印與一實相印的毫無矛盾決不是什麼小乘三法印大乘一實相印可以機械地分判的即一實相印的三法印在聲聞法中側重在有情空那就是諸行無常諸法無我涅槃寂靜在大乘法中遍通到一切法側重在法空那就是緣起生滅的假名緣起無實的性空緣起寂滅空亦復空的中道本論説衆因緣生法我説即是空亦為是假名亦是中道義這三一無礙的實相是緣起正法聲聞簡要的直從緣起的妄相上出發所以體認到的較單純狹小像毛孔空菩薩深刻的從緣起的本性上出發所以體認到的比較深刻廣大像太虛空上來所説的雖從緣起緣起的集滅緣起的即空即假即中作三層的説明其實只是佛説的正見緣起二遮顯中國學者把融貫看為龍樹學的特色不錯龍樹是綜合的融貫者但他是經過了批判的這不像一般學者不問他是否一貫籠統的把他糅合起來現在為了要明瞭龍樹思想的真義不得不分析一下龍樹學的特色是世俗諦中唯假名勝義諦中畢竟空這性空唯名論是大乘佛法的根本思想也是阿含經中的根本大義凡是初期的大乘經都異口同音的認為勝義皆空是徹底的了義之談後期的大乘學雖承認大乘經的一切空是佛説但不以一切空為了義的徹底的給他作一個別解大乘佛法這才開始走上妙有不空去這又分為兩派一是偏重在真常寂滅的一是偏重在無常生滅的要理解他們