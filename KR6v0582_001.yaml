神通不唯佛有佛弟子中的羅漢聖者也有的不過從化起化是聲聞弟子所不能作到的經中説有六種神通這裡説的世尊神通指神境通而説由世尊神境通的力量作出種種的變化人由這所變化的人復又變作各式各樣的變化人此從化起化的比喻即説明作者作業的都如幻化如最初以世尊為根本所變化出來的人是變化的還能起化所以譬喻本作者那又由變化人所幻作出來的種種化人化事是從幻起幻如以無明愛而起作的業此中有一問題如幻如化經中所常説的但執有自性的學者以為所幻化的可以是假但幻化到底要有能幻化者才能成立此能幻化者不能説是假有的所以他們歸結到實有自相有這不但聲聞學者即以大乘學者自居的唯識家也還是如此這本來自性見未盡難以使他悟解一切皆空皆假名的所以論主特出方便以從化起化的事象譬喻作者作業的一切空而一切假讀者應了解論主深意勿執著世尊是實有否則如狗逐塊終無了期這煩惱及業作者及果報沒有一法是有實自性的一切都是如幻如夢如焰如響的幻是魔術所幻現的牛馬等相夢是夢境焰是陽焰就是日光照到潮濕的地方蒸發熱氣上升時現出一種水波的假相響是谷響是人在深山中發聲這邊高聲大叫那邊就有同樣的回響並沒有真的人在那裡發聲這些都是不實在的都是可聞可見而現有的這比喻無自性空但空不是完全沒有而是有種種假相的假使什麼都沒有也就不會舉這些做比喻而應該以石女兒等來做喻了所以如幻等喻譬喻自性空又譬喻假名有也就因此一切法即有即空的無礙開示佛陀的中道這三頌不特是總結本品世間集的十二品也都以此作總結觀法品第十八此下是大科別觀中的第三觀世間集滅滅是四諦中的滅諦佛從假名中安立滅諦實即一切法本性寂滅的實證能證所證畢竟空寂如經中所説無智亦無得無一切可取的一般學者以為有為法外別有滅諦以為實有能證所證以為實有修因證果以為實有煩惱可斷真實可得一切是實有自性的有所得的人無道無果所以論主一一觀察開顯此證滅的真相以引人得道此中大分三門本品先論現觀即直示正觀悟入實相的教授為一大科的中心所在觀法品的觀是現觀或正觀就是悟入如實相的實相慧抉擇正法的有漏聞思修慧隨順無漏般若也稱為正觀法是軌持軌是規律或軌範持是不變或不失事事物物中的不變軌律含有本然性必然性普遍性的都可以叫做法合於常遍本然的理則法有多種不同但其中最徹底最究竟最高上的法是一切法空性現觀這真實空性法所以叫觀法體悟真如空性法聲聞行者在初果菩薩行者在初地經中説知法入法度諸疑惑就是悟達此空真如性能悟入畢竟空的智慧稱為淨法眼聖者體悟諸法的真實必須如實修行在正確的實踐中最重要的是智慧的如實現觀現觀是超越能所的認識關係而冥證的直觀近於一般人所説的神祕經驗佛弟子有了正確的直觀經驗這才是在佛法中得到了新生命正確的洞見佛法現證解脫名為得道悟法得道聲聞學者有兩派思想不同一如薩婆多部等主張別觀四諦先體悟苦諦中流動演變的諸行無常沒有作者受者我的諸法無我後通達滅諦中不生不滅的寂靜涅槃這次第悟入的見地也名見四諦得道見有得道二如大衆分別説系學者説真正的體悟必須通達了空寂不生的涅槃證滅諦以前正觀諸行無常諸法無我等不能算為領悟真理的這頓悟的見解也名見滅諦得道或見空得道但所見滅諦有以為見滅諦即見真實的有以為因滅會真的依性空宗真義説無常無我及涅槃不生即是畢竟空的方便假説常性不可得我性不可得生性不可得一空一切空三法印即是一實相無二無別見必頓見如未能通達無自性空不但無常無我不見真諦觀無生也還有所滯呢本品的意義中觀家的解釋每有不同如體悟的真理是大乘所悟的是小乘所悟的大小乘所悟的是同是異這都是諍論所在清辨説小乘唯悟我空大乘悟我法二空所以他解釋本品時就依這樣的見解去分別以為這頌是小乘所悟的那頌是大乘所悟的月稱説大乘固然悟我法二空小乘也同樣的可以悟入我法二空性所以他解釋本品時不分別大小依本論以考察論主的真意月稱所説是對的本品先明我空後明法空大乘小乘的正觀實相確乎都要從我空下手的通達了我空即能通達我所法空有我見必有我所見得我空也可得法空所以釋尊的本教一致的直從我空入手其中悟二空淺的是小乘如毛孔空悟二空深的是大乘如太虛空悟入有淺深差別而所悟的是同一空性真理是不二的在全論的科判中青目的中觀論釋西藏的無畏論佛護的中論釋等都説後二品是以聲聞法入第一義前二十五品是以大乘法入第一義這樣本品是依大乘法悟入第一義了但細究全論實依四諦開章本不能劃分大小本品的頌文從無我入觀到辟支佛的悟入也決非與二乘不同所以本品是正確指示佛法悟入真實的真義即釋尊本教阿含所開示的三乘學者無不依此觀門而悟入的古代的三論師起初也是沒有分別三乘的後來受了後期佛教大乘不共的影響也就分割本品以為初是聲聞所悟的次是菩薩所悟的末一頌是緣覺所悟的不知中觀論論究的法相是阿含經從頭至尾都是顯示釋尊的根本教法釋尊開示所悟的如實法論主即依經作論如實的顯示出來佛的根本教典主要的明體悟我空所以論主説阿含多明無我多説我空但佛的本意生死根本是妄執實有特別是妄執實有的自我所以多開示無我空如能真的解了我空也就能進而體悟諸法無實的法空了但一分聲聞學者不能理解這點以為不見有我確實有法是佛説的究竟義龍樹見到了這種情形認為沒有領悟佛的本意他們如執著諸法實有也決不能了解我空所以在本論中一一指出他們的錯誤使他們了解法性本空學問不厭廣博而觀行要扼其關要所以本品正論觀法如不見有我也就沒有我所法正見一切諸法的本來空寂性了從破我下手顯示諸法的真實為三乘學者共由的解脫門明我空不但是聲聞説法空也不但是菩薩一切法性空卻要從我空入手此是本論如實體見釋尊教意的特色真如的體悟是要如實修習的佛法的體見真理特別重在觀察就是以種種方法種種論理以分別觀察久觀純熟才能破除種種妄見在澄淨的直覺中悟達畢竟空寂性這不是僥幸可得或自然會觸發的也不是專在意志集中的靜定中可以悟得的體悟了真理煩惱就被淨化不起淨化了自心所悟的真性愈明但觀察要正確確實的如理觀察並非假定一種意境去追求他如觀察不正確雖有許多幻境不但不能淨化內心不能體悟真相而且每每加深狂妄走上更荒謬的險道不是著有就是落空佛教的正觀以現實事相為境不預先假定其為如何而以深刻的觀慧探索他的本來真相所以能破除迷妄而不為自己的意見所欺久久觀成勘破那蒙蔽真理的妄見就洞見真理了如窗紙蒙蔽了窗外的事物戳破紙窗就清楚的見到一切不見真理所以有生死生死的動力是一切行業行業的造作由於煩惱煩惱的根本是無明或我見所以無明滅而明生就可徹見諸法的真相解脫衆苦丙三觀世間集滅丁一現觀戊一入法之門己一修如實觀若我是五陰我即為生滅若我異五陰則非五陰相若無有我者何得有我所滅我我所故名得無我智得無我智者是則名實觀得無我智者是人為希有印度的宗教哲學者説有情的生死輪回是以小我的靈魂為主體的宇宙的一切現象以大我的梵為實體的這小我大我經佛的正智觀察斷為如有我生死輪回不可能宇宙的一切也無法成立外道的大我假使人格化那就是神是上帝是梵天假使理體化那就是各式各樣的神祕的大實在這種思想在佛法的體系中是徹底的掃蕩神或上帝是我佛所極端痛斥的佛法在印度思想中的根本特點就在此我是主宰義主是自己作得主含有自由自在的意思宰是宰割能支配統治自由區分一切的意思妄執有我就以自我是世間的中心一切的一切都是以自我的評價為標準以自己的意見去決定他我見的擴展而投射到外面稱之為神以為是世間的支配者創造者是自在的感到人格神的不能成立就演化為宇宙的實體物質或精神這是自己完成的永恆常存的不是宇宙為一絶對的實體即想像為無限差別的多元各各獨立的這些是佛經所常據以破斥的我然佛説無我的真意不僅摧破這些分別推論而建立的我我見是生死根本是一切有情一切凡人所共同直覺到的所以常識直覺中的自我感不加分別而自然覺到的自有常有獨有的自我為我見的根源實為佛説無我的主要對象此無我也即是沒有補特伽羅我也就是無那身心和合中人人直覺的主宰我自己所覺到的我是主宰是不離環境的所以內執自我同時必執外在的我所我所屬於我與我有密切的聯繫我所有的我所知的以及我所依的都是也即是法我他的所以被執為實有與我見同樣的是同一的自性見一分聲聞學者以為我是無的法是有的這實在沒有懂得佛陀的教意要知沒有自我即沒有我所以無自性的正觀通達人無我也必能以同樣的觀慧了解外在的一切一切沒有自性必然能達到法無我的正覺從人無我可以達到法無我所以佛多説有情身心和合的自我不可得人人所直覺到的我雖然外道計執為即蘊或離蘊的然依阿含經説若計有我一切皆於此五受陰計有我他決非離身心而存在身心的要素佛常説是五陰生理的機構血肉的軀體是色法心理的活動不外情緒的感受想像的認識意志的造作而能知這三者的是心識的作用約精神與物質的分別色陰是物質的受想行識四陰是精神的約能知與所知分別識陰是能知的色受想行四陰是所知的反觀自我身心中了不可得除了五陰更沒有我的體用我不過是依五蘊和合而有的假我如探求他的實體一一蘊中是不可得的外道要執有實我那麼如我是五陰那所説的我應該與五陰一樣是生滅的色法的遷變演化在人的生理上是很顯著的心理的變化更快更大苦樂的感受不是時刻的在變動嗎認識意志都在息息不停的變化中不但是所知的四陰是生滅變化的就是能知的心識也是生滅變動的我們反省認識時心識已是客觀化了客觀化的能知者也就是所知者他與前四陰一樣的是生滅法凡是認識必有主觀與客觀的相待而存在不離客觀的主觀必因客觀的變化而變化在反省主觀的認識時立刻覺了此前念的主觀已過去現在所覺了的僅是一種意境與回憶中的東西一樣佛法不承認有此離客觀的主觀獨存常存各式各樣的真常唯心論者有我論者他們以為主觀性的能知者永遠是不能認識的始終是內在的統一者反省時所覺到的是主觀的客觀化不是真的主觀所以産生真心常住的思想然而既是不可認識的認識者又從何而知他是認識者而且憑什麼知道過去主觀的認識與此時的主觀認識是一常住不變真的不可認識嗎根本佛法是不承認有能知者不可為所知的或是常住的主張有我的決不肯承認我是生滅的因為生滅即是推翻自我的定義所以有的主張離蘊我然而我如異於五陰我與陰分離獨在即不能以五陰的相用去説明不以五陰為我的相那我就不是物質的也不是精神的非見聞覺知的那所説的離蘊我究竟是什麼呢我不就是五陰破即蘊的我我不異於五陰破離蘊的我凡是計著有我的無論他説我大我小我在色中色在我中乃至種種的不同到底是依五陰而計為我的所以破了離陰即陰的我一切妄執的我無不破除這樣的破我雖是破除分別計執的我但要破除一切衆生所共同直覺存在的人同此心心同此感的俱生我也還是從此而入因為如確有實我那加以推論總不出離蘊即蘊二大派如離蘊即蘊我不可得一切實我都可以迎刃而破了我所凡自我見所關涉到的一切都是如燈光所照到的一切都是燈所照的燈如自我光所達到的如我所有我見即有我所見我所或是我所緣的一切或是我所依而存在的身心覺得是真實性的為我所有的即是法見我所見我所見依我見而存在無有我的自性可得我所也就沒有了所以説何得有我所這是從我空而達到法空不過無我但無自性有的我流動變化中依身心和合而存在的緣起假名我是有的這假名我不可説他就是蘊也不可説他不是蘊他是非即蘊非離蘊的但也不如犢子系所想像的不可説我假名我是不無緣起的幻相而實性不可得的正確的悟解身心和合中的緣起假名我就是正見有了正見可破除常住真實的自我了在吾人的身心和合演變中有不斷不常不一不異的假名我衆生不知道他是假名無實的這才執為是真實自性有了假名的緣起我不離因緣而存在所以非自有的依他因緣而俱起所以非獨存的在息息流變中所以非常住的通達此緣起假名我一方面不否定個性與人格能信解作與受的不斷不常一方面也不生起錯誤的邪見走上真常的唯心與唯神依緣起我而正見性空即我法二執不生正見諸法的真相了上一頌半觀所觀境空下一頌半即解成觀而得真空慧觀我我所不可得我法二執不起通達一切法無我我所的般若現前名無我智一分學者以為無我智是淺的是共聲聞所得的法空智更深刻些唯菩薩能得又有人説法空智還不徹底要即空即假的中道智才是微妙究竟的依本論所發揮的阿含真義無我智是體悟真實相的唯一智慧這是凡聖關頭有了無我智就是聖者沒有就是凡夫不過二乘聖者求證心切所以不廣觀一切法空只是扼要的觀察身心無我佛也應此等機多説人無我不能正見法無自性中薩迦耶見的妄執自我為生死根本所以能離薩迦耶見無我無我所自會不執著一切法而離我法的繫縛了月稱説聲聞學者通達了人無我如進一步的觀察諸法是一定可以通達法空的他們可以不觀法空但決不會執法實有我們要知道後代佛法的廣明一切法空一是菩薩的智慧深廣一是為了聲聞學者的循名著相不見真義於我法中起種種見所以於內我外法廣泛推求令通達諸法無自性論到依解成行仍從無我智入得無我智即能洞見我法二空了因此三乘聖者解脫生死的觀慧是無差別的只是廣觀略觀不同罷了論説滅我我所故名得無我智即指此實相般若的現覺得到這無我智才真是能如實觀法實相的能得這無我智的是人最為希有他已超凡入聖不再是一般的凡夫了佛説的般若不是常識的智慧也不是科學哲學家的智慧他們的智慧只是世間常識智的精練而已凡是世俗智不能了解無自性不能對治生死的根本自然也不能得解脫此中所説的無我智是悟解一切我法無自性的真實智也名為勝義智勝義無我智所體悟的即一切法的真相一法如此法法如此是一切法的常遍法性不像世俗智境那樣的差別而是無二無別的朴質簡要周利槃陀那樣的愚鈍均頭沙彌那樣的年輕須跋陀羅那樣的老耄都能究竟通達這可説是最簡最易的然而在一般的思想方式中永不能契入所以又是非常難得的清辨般若燈論後一頌作得無我我所不見法起滅無我我所故彼見亦非見解説也不同他説以無我觀見諸法的剎那生滅悟到無常是苦苦故無我得無我智通達我空唯見法生法滅這是二乘的悟境再進一步觀無我故即無我所一切法的生滅相不現前悟得不生不滅時不但生滅的法相空無所有得無我我所的觀想也不現前到達境智一如能所雙泯才是菩薩悟見真法性的智慧然而本論雖有此從我空到我所空的觀行過程但決不能以此而判大小不但菩薩就是二乘如真的現覺無我也決無能所差別的不會有無我觀想的金剛經即明白説到這一點而且依梵文藏文的本頌作無我我所執彼亦無所有見無執有依此則為不見文意是外人難以無我智通達無我無我所執有智為能證有空相為所證這還不是我與我所的別名所以論主説現證無我我所時決不會自覺有我能證無我我所的如見到自己無我我所執這是不能見真理的這樣頌文在解説泯除我能證無我的觀念雖與青目釋不同然在全體思想上卻沒有矛盾清辨論師所釋顯然是別解了己二得解脫果內外我我所盡滅無有故諸受即為滅受滅則身滅業煩惱滅故名之為解脫業煩惱非實入空戲論滅這兩頌向來有不同的解説三論宗的學者説這是聲聞的解脫依青目論前頌是無餘涅槃後頌是有餘涅槃月稱論師説這是一般的解脫清辨論師説前頌明小乘解脫唯滅煩惱障後頌明大乘解脫雙滅煩惱所知障推究論意應同月稱説即前頌説所得的解脫果後頌説能得解脫果的所以然內而身心外而世界在這所有的一切法上妄起我我所執執內身是我執外法是我所有等如能得無我智即能把我我所執盡滅無有我我所見滅諸受也就滅除不起了諸受即諸取一我語取這是根本的內見自我實我而執持他二欲取以自我為主執著五欲的境界而追求